version: "3.8"
services:
  hermes-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes_control
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    ports:
      - "5432:5432"
    volumes:
      - hermes-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_control"]
      interval: 10s
      timeout: 5s
      retries: 5
  maze:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../maze-forest:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hermes-postgres:
